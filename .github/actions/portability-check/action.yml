name: "Schema Gateway Portability Check"
description: "Lint one JSON schema across OpenAI, Gemini, Anthropic, and Ollama and publish a job summary."

inputs:
  schema:
    description: "Path to the JSON schema file relative to the working directory."
    required: true
  baseline-schema:
    description: "Optional path to the previous schema version. When set, Schema Gateway also computes a regression report."
    required: false
    default: ""
  targets:
    description: "Comma-separated provider targets."
    required: false
    default: "openai,gemini,anthropic,ollama"
  name:
    description: "Schema/tool name used in generated provider snippets."
    required: false
    default: "schema_gateway_output"
  description:
    description: "Description used in generated provider snippets."
    required: false
    default: "Structured output generated by Schema Gateway."
  prompt:
    description: "Prompt text embedded in generated request snippets."
    required: false
    default: "Return only JSON that matches the provided schema with no extra commentary."
  working-directory:
    description: "Directory that contains the schema file."
    required: false
    default: "."
  fail-on-errors:
    description: "Fail the workflow when portability errors are detected."
    required: false
    default: "true"
  fail-on-regressions:
    description: "Fail the workflow when the diff report flags a likely breaking change."
    required: false
    default: "true"

outputs:
  has-errors:
    description: "Whether the lint report contains any error-level issues."
    value: ${{ steps.analyze.outputs.has-errors }}
  lint-report-path:
    description: "Temporary path to the generated lint report JSON file."
    value: ${{ steps.analyze.outputs.lint-report-path }}
  compile-report-path:
    description: "Temporary path to the generated compile report JSON file."
    value: ${{ steps.analyze.outputs.compile-report-path }}
  diff-report-path:
    description: "Temporary path to the generated diff report JSON file when baseline-schema is set."
    value: ${{ steps.analyze.outputs.diff-report-path }}
  has-regressions:
    description: "Whether the optional diff report flags a likely breaking change."
    value: ${{ steps.analyze.outputs.has-regressions }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - id: bootstrap
      name: Build Schema Gateway CLI
      shell: bash
      run: |
        set -euo pipefail
        ACTION_ROOT="$(cd "$GITHUB_ACTION_PATH/../../.." && pwd)"
        echo "action_root=$ACTION_ROOT" >> "$GITHUB_OUTPUT"
        cd "$ACTION_ROOT"
        npm ci
        npm run build -w packages/core
        npm run build -w packages/sdk

    - id: analyze
      name: Lint and compile schema
      shell: bash
      run: |
        set -euo pipefail
        ACTION_ROOT="${{ steps.bootstrap.outputs.action_root }}"
        REPORT_DIR="$RUNNER_TEMP/schema-gateway"
        mkdir -p "$REPORT_DIR"

        SCHEMA_PATH="${{ inputs.schema }}"
        if [[ "${{ inputs.working-directory }}" != "." ]]; then
          SCHEMA_PATH="${{ inputs.working-directory }}/${{ inputs.schema }}"
        fi
        BASELINE_SCHEMA_PATH=""
        if [[ -n "${{ inputs.baseline-schema }}" ]]; then
          BASELINE_SCHEMA_PATH="${{ inputs.baseline-schema }}"
          if [[ "${{ inputs.working-directory }}" != "." ]]; then
            BASELINE_SCHEMA_PATH="${{ inputs.working-directory }}/${{ inputs.baseline-schema }}"
          fi
        fi

        node "$ACTION_ROOT/packages/sdk/dist/cli.js" lint \
          --schema "$SCHEMA_PATH" \
          --target "${{ inputs.targets }}" \
          > "$REPORT_DIR/lint.json"

        node "$ACTION_ROOT/packages/sdk/dist/cli.js" compile \
          --schema "$SCHEMA_PATH" \
          --target "${{ inputs.targets }}" \
          --name "${{ inputs.name }}" \
          --description "${{ inputs.description }}" \
          --prompt "${{ inputs.prompt }}" \
          > "$REPORT_DIR/compile.json"

        DIFF_REPORT_PATH=""
        HAS_REGRESSIONS="false"
        if [[ -n "$BASELINE_SCHEMA_PATH" ]]; then
          node "$ACTION_ROOT/packages/sdk/dist/cli.js" diff \
            --baseline "$BASELINE_SCHEMA_PATH" \
            --candidate "$SCHEMA_PATH" \
            --target "${{ inputs.targets }}" \
            > "$REPORT_DIR/diff.json"
          DIFF_REPORT_PATH="$REPORT_DIR/diff.json"
          HAS_REGRESSIONS="$(node "$GITHUB_ACTION_PATH/has-regressions.mjs" "$DIFF_REPORT_PATH")"
        fi

        node "$GITHUB_ACTION_PATH/write-summary.mjs" \
          "$REPORT_DIR/lint.json" \
          "$REPORT_DIR/compile.json" \
          "$GITHUB_STEP_SUMMARY" \
          "$SCHEMA_PATH" \
          "$DIFF_REPORT_PATH"

        HAS_ERRORS="$(node "$GITHUB_ACTION_PATH/has-errors.mjs" "$REPORT_DIR/lint.json")"
        echo "has-errors=$HAS_ERRORS" >> "$GITHUB_OUTPUT"
        echo "lint-report-path=$REPORT_DIR/lint.json" >> "$GITHUB_OUTPUT"
        echo "compile-report-path=$REPORT_DIR/compile.json" >> "$GITHUB_OUTPUT"
        echo "diff-report-path=$DIFF_REPORT_PATH" >> "$GITHUB_OUTPUT"
        echo "has-regressions=$HAS_REGRESSIONS" >> "$GITHUB_OUTPUT"

        if [[ "${{ inputs.fail-on-errors }}" == "true" && "$HAS_ERRORS" == "true" ]]; then
          echo "Schema Gateway found portability errors." >&2
          exit 1
        fi

        if [[ -n "$DIFF_REPORT_PATH" && "${{ inputs.fail-on-regressions }}" == "true" && "$HAS_REGRESSIONS" == "true" ]]; then
          echo "Schema Gateway found likely breaking schema regressions." >&2
          exit 1
        fi
